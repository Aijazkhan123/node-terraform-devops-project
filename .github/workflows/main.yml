name: node-terraform-project DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Login to DockerHub
        run: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: Build Docker Image
        run: docker build -t nodejsonapp/node-terraform-project .

      - name: Push Image to DockerHub
        run: docker push nodejsonapp/node-terraform-project

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform

      - name: Wait for EC2 to be ready
        run: sleep 60  # wait 1 minute for EC2 and Docker

      - name: Check Node.js App
        run: |
          # Get public IP of the EC2 instance
          EC2_IP=$(terraform output -raw ec2_public_ip)
          echo "EC2 Public IP: $EC2_IP"

          # Test the Node.js endpoint
          RESPONSE=$(curl -s http://$EC2_IP:3000)
          echo "Response from app: $RESPONSE"

          # Fail the job if response does not contain expected message
          if [[ "$RESPONSE" != *"Hello from Node.js DevOps Project"* ]]; then
            echo "App check failed!"
            exit 1
          fi
       

      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: terraform
