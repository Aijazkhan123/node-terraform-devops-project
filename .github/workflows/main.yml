name: node-terraform-project DevOps CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform  # <-- folder where main.tf is

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Docker Build & Push
      - name: Login to DockerHub
        run: docker login -u ${{ secrets.DOCKER_USER }} -p ${{ secrets.DOCKER_PASS }}

      - name: Build Docker Image
        run: docker build -t nodejsonapp/node-terraform-project .

      - name: Push Docker Image
        run: docker push nodejsonapp/node-terraform-project

      # 3️⃣ AWS Terraform Deployment
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.6.3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply
        run: terraform apply -auto-approve

      # 4️⃣ Get EC2 Public IP
      - name: Get EC2 Public IP
        id: ec2_ip
        run: echo "EC2_PUBLIC_IP=$(terraform output -raw ec2_public_ip)" >> $GITHUB_ENV

      - name: Show EC2 Public IP
        run: echo "Your EC2 is deployed at: ${{ env.EC2_PUBLIC_IP }}"
       

    
